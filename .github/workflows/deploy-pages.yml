name: Deploy to GitHub Pages

# Builds the static export and publishes it to GitHub Pages on every push to
# main. No artifacts are committed — Pages always reflects the latest source.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress deploy finish, but only keep the newest queued run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Skip the Electron binary download — it's a devDependency the web build
      # never needs, and pulling it would add ~100 MB and a minute to every run.
      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Build static export
        run: npm run build
        env:
          # Serve assets/routes from the repo's Pages subfolder.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      # Stop GitHub treating the _next/ folder as Jekyll source.
      - name: Disable Jekyll
        run: touch out/.nojekyll

      # Pages is enabled once at the repo level (Settings → Pages → "GitHub
      # Actions"); this step just reads that config for the build.
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
